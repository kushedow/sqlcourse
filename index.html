<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/public/style.css" rel="stylesheet">
    <title>Онлайн-тренажер (симулятор) SQL c ИИ-помощником. 100+ задач бесплатно!</title>

    <meta name="description" content="Изучайте SQL с упражнениями и задачами по написанию SQL запросов в PostgreSQL. Понятная теория, прикольные задачи, объяснения на фруктах и котятах!"/>

      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Sansation:wght@400;700&display=swap" rel="stylesheet">


      <!-- Yandex.Metrika counter -->
      <script type="text/javascript" >
          (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
              m[i].l=1*new Date();
              for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
              k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})
          (window, document, "script", "https://mc.yandex.ru/metrika/tag.js", "ym");

  </head>
  <body class="bg-[#F2F6F8] h-full">
    <div id="app" class="vh"></div>
    <script type="module" src="/src/main.ts"></script>



    <!-- NPS Форма -->
    <div id="nps-bar" class="fixed bottom-0 left-0 w-full bg-black text-white p-4 md:p-6 transition-all duration-300 z-50 border-t border-gray-800">
        <div class="max-w-6xl mx-auto relative">

            <!-- Кнопка закрытия -->
            <button onclick="closeNps()" class="absolute -top-2 -right-2 md:top-0 md:right-[-40px] text-gray-400 hover:text-white text-3xl p-2 leading-none" aria-label="Закрыть">
                &times;
            </button>

            <!-- Основной контейнер состояний -->
            <div id="nps-content" class="flex flex-col items-center justify-center min-h-[60px]">

                <!-- Шаг 1: Выбор оценки (1/3 текст, 2/3 кнопки на десктопе) -->
                <div id="step-rating" class="flex flex-col md:flex-row items-center w-full gap-6">
                    <!-- 1/3 ширины под текст -->
                    <div class="w-full md:w-1/3 text-center md:text-left">
                        <p class="text-sm md:text-base font-medium">
                            Насколько вероятно, что вы порекомендуете сервис другу или коллеге?
                        </p>
                    </div>

                    <!-- 2/3 ширины под кнопки -->
                    <div class="w-full md:w-2/3 flex flex-wrap justify-center md:justify-end gap-1 md:gap-2">
                        <script>
                            for (let i = 1; i <= 10; i++) {
                                document.write(`
                                    <button onclick="selectScore(${i})" class="w-8 h-8 md:w-10 md:h-10 bg-white text-black rounded hover:bg-gray-200 transition-colors text-sm font-bold">
                                        ${i}
                                    </button>
                                `);
                            }
                        </script>
                    </div>
                </div>

                <!-- Шаг 2: Комментарий (для 1-8) -->
                <div id="step-comment" class="hidden w-full flex-col md:flex-row items-center gap-3">
                    <input type="text" id="comment-input" placeholder="Расскажите, что мы можем улучшить?"
                           class="w-full bg-gray-900 border border-gray-700 rounded px-4 py-2 text-sm focus:outline-none focus:border-white transition-colors">
                    <button onclick="submitFeedback()" class="whitespace-nowrap bg-white text-black px-6 py-2 rounded text-sm font-bold hover:bg-gray-200 transition-colors">
                        Отправить
                    </button>
                </div>

                <!-- Шаг 3: Финальное сообщение -->
                <div id="step-thanks" class="hidden py-2 text-lg font-medium">
                    Спасибо за оценку!
                </div>

                <!-- Шаг 4: Сообщение о блокировке (для 9-10) -->
                <div id="step-lock" class="hidden py-2 text-sm md:text-base text-red-400 font-bold text-center">
                    Настало время отвечать за слова, сервис будет заблокирован, пока вы не пригласите 2 друзей.
                </div>

            </div>
        </div>
    </div>

    <script>
        let currentScore = 0;
        const url = 'https://n8n-latest-5cu5.onrender.com/webhook/asql/feedback';

        function closeNps() {
            const bar = document.getElementById('nps-bar');
            if (bar) {
                bar.style.transform = 'translateY(100%)';
                setTimeout(() => bar.remove(), 300);
            }
        }

        function selectScore(score) {
            currentScore = score;
            document.getElementById('step-rating').classList.add('hidden');

            if (score >= 9) {
                document.getElementById('step-lock').classList.remove('hidden');
                sendData("");
            } else {
                document.getElementById('step-comment').classList.remove('hidden');
                document.getElementById('comment-input').focus();
            }
        }

        function submitFeedback() {
            const comment = document.getElementById('comment-input').value;
            document.getElementById('step-comment').classList.add('hidden');
            document.getElementById('step-thanks').classList.remove('hidden');

            sendData(comment);
            setTimeout(closeNps, 3000);
        }

        async function sendData(comment) {
            const data = {
                score: currentScore,
                comment: comment
            };

            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }
    </script>





  </body>
</html>
